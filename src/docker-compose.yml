secrets:
  db_password:
    file: ./secrets/db_password_${ZNUNY_INSTANCE}

networks:
  znuny-net:
    driver: bridge

volumes:
  ZnunyPersistent:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZNUNY_PERSISTENT_FOLDER}/${ZNUNY_INSTANCE}/persistent
  ZnunyLog:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZNUNY_PERSISTENT_FOLDER}/${ZNUNY_INSTANCE}/log
  ZnunyArticle:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZNUNY_PERSISTENT_FOLDER}/${ZNUNY_INSTANCE}/article
  ZnunyHTDocs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ZNUNY_PERSISTENT_FOLDER}/${ZNUNY_INSTANCE}/htdocs_custom

services:
  znuny-daemon:
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.znuny
      target: daemon
      args:
        ZNUNY_VERSION: ${ZNUNY_VERSION}
        ZNUNY_CHECKSUM: ${ZNUNY_CHECKSUM}
        ZNUNY_SIGNATURE: ${ZNUNY_SIGNATURE}
    container_name: znuny_daemon_${ZNUNY_INSTANCE}
    depends_on:
      - znuny-httpd
    networks:
      - znuny-net
    secrets:
      - db_password
    environment:
      DB_HOST: ${DB_HOST:-znuny-db}
      DB_NAME: ${DB_NAME:-znuny}
      DB_USER: ${DB_USER:-znuny}
    restart: unless-stopped
    volumes:
      - ZnunyLog:/opt/znuny/var/log
      - ZnunyArticle:/opt/znuny/var/article
      - ZnunyHTDocs:/opt/znuny/var/httpd/htdocs/custom
      - ZnunyPersistent:/persistent

  znuny-httpd:
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.znuny
      target: httpd
      args:
        ZNUNY_VERSION: ${ZNUNY_VERSION}
        ZNUNY_CHECKSUM: ${ZNUNY_CHECKSUM}
        ZNUNY_SIGNATURE: ${ZNUNY_SIGNATURE}
    container_name: znuny_httpd_${ZNUNY_INSTANCE}
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - znuny-net
    secrets:
      - db_password
    environment:
      DB_HOST: ${DB_HOST:-znuny-db}
      DB_NAME: ${DB_NAME:-znuny}
      DB_USER: ${DB_USER:-znuny}
    restart: unless-stopped
    volumes:
      - ZnunyLog:/opt/znuny/var/log
      - ZnunyArticle:/opt/znuny/var/article
      - ZnunyHTDocs:/opt/znuny/var/httpd/htdocs/custom
      - ZnunyPersistent:/persistent