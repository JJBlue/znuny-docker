volumes:
  MariaDBVol:

services:
  znuny-daemon:
    depends_on:
      - znuny-db

  znuny-httpd:
    depends_on:
      - znuny-db

  znuny-db:
    image: mariadb:${MARIADB_VERSION:-latest}
    container_name: znuny_db
    mem_limit: ${DB_MEMLIMIT:-2048m}
    secrets:
      - db_root_password
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    volumes:
      - MariaDBVol:/var/lib/mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - znuny-net
    command: [
      "--max_allowed_packet=256M",
      "--innodb_log_file_size=512M"
    ]
    labels:
      org.label-schema.group: "znuny"
    # ---- Security hardening ----
    read_only: true          # root FS is read-only; data goes on volumes
    tmpfs:
      - /tmp                 # MariaDB needs a writable /tmp
      - /var/run/mysqld      # socket directory
      - /run/mysqld
    cap_drop:                # Drop all capabilities
      - ALL
    cap_add:                 # Add needed for MariaDB.
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - SYS_NICE
    security_opt:
      - no-new-privileges:true
